<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tom George — Engineer Curriculum</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    /* Dashboard page overrides */
    body { padding: 0; }

    .pillar-heading {
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .pillar-section { margin-bottom: 3rem; }
    .topic-group { margin-bottom: 2rem; }

    .topic-label {
      font-family: var(--font-ui);
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .topic-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .lesson-card {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      text-decoration: none;
      color: var(--text);
      margin-bottom: 0.6rem;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    }
    .lesson-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(37,99,235,0.1);
      transform: translateY(-1px);
      opacity: 1;
    }

    .lesson-num {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      background: var(--pill-bg);
      border-radius: 5px;
      padding: 0.2rem 0.45rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
      letter-spacing: 0.04em;
    }

    .lesson-card-body { flex: 1; }

    .lesson-card-title {
      font-family: var(--font-ui);
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.2rem;
    }

    .lesson-card-sub {
      font-family: var(--font-ui);
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .lesson-arrow {
      font-size: 0.9rem;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 0.15rem;
      transition: color 0.15s, transform 0.15s;
    }
    .lesson-card:hover .lesson-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    .coming-soon-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1.1rem;
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: var(--bg);
      margin-bottom: 0.6rem;
      opacity: 0.55;
    }
    .coming-soon-card .lesson-num { background: transparent; border: 1px solid var(--border); }
    .coming-soon-label {
      font-family: var(--font-ui);
      font-size: 0.8rem;
      color: var(--muted);
    }
    .coming-badge {
      font-family: var(--font-ui);
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      background: var(--pill-bg);
      color: var(--muted);
      margin-left: 0.5rem;
    }
    .view-heading { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.25; margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.6rem; }
    .view-desc { font-family: var(--font-ui); font-size: 0.88rem; color: var(--muted); margin-bottom: 1.75rem; }
  </style>
</head>
<body>
<div class="dashboard-layout">

  <!-- ── SIDEBAR ─────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div style="display:flex;align-items:center;gap:0.75rem">
      <div class="avatar-circle">TG</div>
      <div>
        <div style="font-family:var(--font-ui);font-weight:700;color:#f9fafb;font-size:0.95rem">Tom George</div>
        <div class="level-badge" id="level-badge">Level 1</div>
      </div>
    </div>

    <div class="xp-bar-wrap">
      <div class="xp-bar-label">
        <span id="xp-label">0 XP</span>
        <span id="xp-next-label">200 XP to next</span>
      </div>
      <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    </div>

    <div class="streak-badge" id="streak-badge">🔥 <span class="streak-count">0</span> day streak</div>

    <div class="sidebar-card" id="mission-card">
      <div class="sidebar-card-label">Today's Mission</div>
      <div class="sidebar-card-title" id="mission-title">Loading...</div>
      <div class="sidebar-card-sub" id="mission-sub"></div>
      <div class="sidebar-card-xp" id="mission-xp"></div>
    </div>

    <div class="sidebar-card" id="review-card" style="display:none">
      <div class="sidebar-card-label">Review Queue</div>
      <div class="sidebar-card-title" id="review-title"></div>
      <div class="sidebar-card-sub" id="review-sub"></div>
    </div>

    <div class="sidebar-stats">
      <div class="sidebar-stat"><strong id="stat-lessons">0</strong><span>Lessons</span></div>
      <div class="sidebar-stat"><strong id="stat-xp">0</strong><span>XP</span></div>
      <div class="sidebar-stat"><strong id="stat-streak">0</strong><span>Streak</span></div>
    </div>
  </aside>

  <!-- ── MAIN CONTENT ─────────────────────────── -->
  <main class="main-content">
    <header style="border-bottom:2px solid var(--text);padding-bottom:1.5rem;margin-bottom:2.5rem">
      <div style="font-family:var(--font-ui);font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.4rem">2026 Curriculum</div>
      <h1 style="font-size:2rem;font-weight:700;letter-spacing:-0.03em;line-height:1.2;margin-bottom:0.4rem">Engineer Curriculum</h1>
      <p style="font-family:var(--font-ui);font-size:0.88rem;color:var(--muted)">Targeting senior / staff engineer roles — structured depth over breadth.</p>
    </header>

    <div id="content-view"><!-- rendered by renderView() below --></div>

    <hr>
    <div style="font-family:var(--font-ui);font-size:0.82rem;color:var(--muted)">
      Tom George Learning System &nbsp;·&nbsp; 2026 &nbsp;·&nbsp; Built with Claude Code
    </div>
  </main>
</div>

<script src="assets/engine.js"></script>
<script>
(function() {
  const E = window.LearningEngine;
  if (!E) return;

  /* ---------- sidebar (identity / XP / streak / mission / review / stats) ---------- */

  function renderSidebar() {
    const li = E.getLevelInfo();
    document.getElementById('level-badge').textContent = 'Level ' + li.level;
    document.getElementById('xp-label').textContent = li.xp + ' XP';
    document.getElementById('xp-next-label').textContent = (li.xpForNext - li.xp) + ' to Level ' + (li.level + 1);
    document.getElementById('xp-fill').style.width = (li.xpProgress * 100) + '%';

    const streak = E.getStreak();
    document.getElementById('streak-badge').innerHTML = '🔥 <span class="streak-count">' + streak.count + '</span> day streak';
    document.getElementById('stat-lessons').textContent = Object.values(E.getState().lessons).filter(l => l.read).length;
    document.getElementById('stat-xp').textContent = li.xp;
    document.getElementById('stat-streak').textContent = streak.count;

    const mission = E.getTodaysMission();
    if (mission) {
      document.getElementById('mission-title').textContent = mission.title;
      document.getElementById('mission-sub').textContent = mission.description;
      document.getElementById('mission-xp').textContent = mission.xpReward > 0 ? '+' + mission.xpReward + ' XP' : '';
      if (mission.lessonId) {
        const meta = E.getLessonMeta(mission.lessonId);
        if (meta) {
          const card = document.getElementById('mission-card');
          card.style.cursor = 'pointer';
          card.onclick = () => { window.location.href = meta.file; };
        }
      }
    }

    const due = E.getDueForReview();
    if (due.length > 0) {
      document.getElementById('review-card').style.display = 'block';
      document.getElementById('review-title').textContent = due.length + ' lesson' + (due.length > 1 ? 's' : '') + ' due for review';
      document.getElementById('review-sub').textContent = 'Spaced repetition keeps knowledge fresh.';
    }
  }

  /* ---------- category drill-down (hash-routed) ---------- */

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function lessonCardHtml(lesson) {
    let cls = 'lesson-card' + (lesson.read ? ' completed' : '');
    let reviewBadge = lesson.reviewDue ? '<span class="review-badge">Review</span>' : '';
    return '<a class="' + cls + '" href="' + lesson.file + '">' +
      '<span class="lesson-num">' + lesson.num + '</span>' +
      '<div class="lesson-card-body">' +
        '<div class="lesson-card-title">' + escapeHtml(lesson.title) + reviewBadge + '</div>' +
        '<div class="lesson-card-sub">' + escapeHtml(lesson.subtitle || '') + '</div>' +
      '</div>' +
      '<span class="lesson-arrow">→</span>' +
    '</a>';
  }

  function breadcrumb(crumbs) {
    // crumbs: [{label, hash}] — last one has no hash (current page)
    return '<div class="breadcrumb-nav">' + crumbs.map((c, i) => {
      const sep = i > 0 ? '<span class="crumb-sep">/</span>' : '';
      if (c.hash !== undefined) return sep + '<a href="' + c.hash + '">' + escapeHtml(c.label) + '</a>';
      return sep + '<span class="crumb-current">' + escapeHtml(c.label) + '</span>';
    }).join('') + '</div>';
  }

  function renderCategoryGrid(curriculum) {
    const cards = curriculum.map(cat => {
      const totalLessons = cat.subcategories.reduce((s, sc) => s + sc.lessons.length + sc.comingSoonLessons.length, 0);
      const readLessons = cat.subcategories.reduce((s, sc) => s + sc.lessons.filter(l => l.read).length, 0);
      const progress = cat.comingSoon ? 'Coming soon' : readLessons + ' / ' + totalLessons + ' lessons';
      const inner =
        '<div class="category-card-icon">' + cat.icon + '</div>' +
        '<div class="category-card-label">' + escapeHtml(cat.label) + (cat.comingSoon ? '<span class="coming-badge">Coming soon</span>' : '') + '</div>' +
        '<div class="category-card-desc">' + escapeHtml(cat.description) + '</div>' +
        '<div class="category-card-progress">' + progress + '</div>';
      return cat.comingSoon
        ? '<div class="category-card coming-soon">' + inner + '</div>'
        : '<a class="category-card" href="#cat/' + cat.id + '">' + inner + '</a>';
    }).join('');

    return breadcrumb([{ label: 'Curriculum' }]) +
      '<div class="category-grid">' + cards + '</div>' +
      '<section class="pillar-section" style="margin-top:2.5rem">' +
        '<div class="pillar-heading">Achievements</div>' +
        '<div class="achievements-grid" id="achievements-grid"></div>' +
      '</section>';
  }

  function renderSubcategoryGrid(cat) {
    const cards = cat.subcategories.map(sub => {
      const count = sub.lessons.length + sub.comingSoonLessons.length;
      const readCount = sub.lessons.filter(l => l.read).length;
      if (cat.comingSoon || sub.lessons.length === 0) {
        return '<div class="subcategory-card" style="opacity:0.6;cursor:default">' +
          '<div class="subcategory-card-label">' + escapeHtml(sub.label) + '</div>' +
          '<div class="subcategory-card-count">' + count + ' topic' + (count === 1 ? '' : 's') + ' planned</div>' +
        '</div>';
      }
      return '<a class="subcategory-card" href="#cat/' + cat.id + '/' + sub.id + '">' +
        '<div class="subcategory-card-label">' + escapeHtml(sub.label) + '</div>' +
        '<div class="subcategory-card-desc">' + escapeHtml(sub.description) + '</div>' +
        '<div class="subcategory-card-count">' + readCount + ' / ' + count + ' read</div>' +
      '</a>';
    }).join('');

    return breadcrumb([{ label: 'Curriculum', hash: '#' }, { label: cat.label }]) +
      '<div class="view-heading">' + cat.icon + ' ' + escapeHtml(cat.label) + '</div>' +
      '<div class="view-desc">' + escapeHtml(cat.description) + '</div>' +
      '<div class="subcategory-grid">' + cards + '</div>';
  }

  function renderLessonList(cat, sub) {
    let body = '';
    if (sub.lessons.length > 0) {
      body += '<div class="topic-group">' + sub.lessons.map(lessonCardHtml).join('') + '</div>';
    }
    if (sub.comingSoonLessons.length > 0) {
      body += '<div class="topic-group">' + sub.comingSoonLessons.map((label, i) =>
        '<div class="coming-soon-card"><span class="lesson-num">' + (sub.lessons.length + i + 1) + '</span><span class="coming-soon-label">' + escapeHtml(label) + '</span></div>'
      ).join('') + '</div>';
    }
    return breadcrumb([{ label: 'Curriculum', hash: '#' }, { label: cat.label, hash: '#cat/' + cat.id }, { label: sub.label }]) +
      '<div class="view-heading">' + escapeHtml(sub.label) + '</div>' +
      (sub.description ? '<div class="view-desc">' + escapeHtml(sub.description) + '</div>' : '') +
      body;
  }

  function renderAchievements() {
    const grid = document.getElementById('achievements-grid');
    if (!grid || !E.getAchievementDefs) return;
    E.getAchievementDefs().forEach(a => {
      const el = document.createElement('div');
      el.className = 'achievement-card ' + (a.earned ? 'earned' : 'locked');
      el.innerHTML =
        '<div class="ach-icon">' + a.icon + '</div>' +
        '<div class="ach-label">' + a.label + '</div>' +
        '<div class="ach-desc">' + a.description + '</div>';
      grid.appendChild(el);
    });
  }

  function renderView() {
    const parts = location.hash.replace(/^#/, '').split('/').filter(Boolean); // ['cat', catId, subId?]
    const curriculum = E.getCurriculum();
    const container = document.getElementById('content-view');
    let html;

    if (parts[0] === 'cat' && parts[1]) {
      const cat = curriculum.find(c => c.id === parts[1]);
      if (cat) {
        if (parts[2]) {
          const sub = cat.subcategories.find(s => s.id === parts[2]);
          if (sub) {
            html = renderLessonList(cat, sub);
          }
        }
        if (!html) html = renderSubcategoryGrid(cat);
      }
    }
    if (!html) html = renderCategoryGrid(curriculum);

    container.innerHTML = html;
    if (parts.length === 0) renderAchievements();
  }

  renderSidebar();
  renderView();
  window.addEventListener('hashchange', renderView);
})();
</script>
</body>
</html>
